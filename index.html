<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1f6feb" />
<title>大人の文化祭2026 デジタル安心クイズ</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root{
    --blue:#1f6feb; --blue-d:#1648b0; --green:#16a34a; --green-d:#0f7a36;
    --purple:#7c3aed; --purple-d:#5b21b6; --red:#dc2626; --amber:#f59e0b;
    --ink:#1f2430; --muted:#64748b; --line:#e6e9f0; --bg:#f3f6fb; --card:#ffffff;
    --ok-bg:#e7f8ee; --ng-bg:#fdeaea;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.6;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:540px; margin:0 auto; padding:0 16px 40px; min-height:100vh; display:flex; flex-direction:column;}
  header.app{
    background:linear-gradient(135deg,var(--blue),#3b82f6); color:#fff;
    border-radius:0 0 22px 22px; padding:18px 18px 16px; margin:0 -16px 18px;
    box-shadow:0 6px 18px rgba(31,111,235,.25);

  header.app .ev{font-size:12px; opacity:.9; letter-spacing:.04em;}
  header.app h1{font-size:19px; margin:2px 0 0; font-weight:800; letter-spacing:.01em;}
  header.app .sub{font-size:12.5px; opacity:.95; margin-top:4px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:0 2px 10px rgba(20,40,80,.04); margin-bottom:14px;}
  h2{font-size:18px; margin:2px 0 10px; font-weight:800;}
  p.lead{color:var(--muted); font-size:14px; margin:0 0 14px;}
  .btn{
    display:flex; align-items:center; gap:10px; width:100%; border:none; cursor:pointer;
    font-family:inherit; font-size:16px; font-weight:700; color:#fff; background:var(--blue);
    padding:15px 16px; border-radius:14px; text-align:left; transition:transform .05s ease, filter .15s ease;
  }
  .btn:active{transform:scale(.985);}
  .btn.lg{font-size:17px; padding:17px;}
  .btn.green{background:var(--green);} .btn.purple{background:var(--purple);}
  .btn.ghost{background:#eef2f9; color:var(--ink); font-weight:700; border:1px solid var(--line);}
  .btn.amber{background:var(--amber); color:#3a2a00;}
  .btn .emj{font-size:22px; line-height:1;}
  .btn .meta{font-size:12px; font-weight:600; opacity:.92; display:block; margin-top:2px;}
  .btn .col{display:flex; flex-direction:column;}
  .row{display:flex; gap:10px;}
  .row .btn{flex:1;}
  .pill{display:inline-block; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:999px; background:#eef2f9; color:var(--muted);}
  .pill.safety{background:#e8f0ff; color:var(--blue-d);}
  .pill.ai{background:#f1e9ff; color:var(--purple-d);}
  .pill.kids{background:#e7f8ee; color:var(--green-d);}
  .pill.normal{background:#e8f0ff; color:var(--blue-d);}
  .pill.hard{background:#f1e9ff; color:var(--purple-d);}
  .note{font-size:12px; color:var(--muted); background:#f6f8fc; border:1px dashed var(--line); border-radius:12px; padding:10px 12px;}
  .progress{height:9px; background:#e8edf6; border-radius:999px; overflow:hidden; margin:4px 0 14px;}
  .progress > i{display:block; height:100%; background:linear-gradient(90deg,var(--blue),#5b9bff); border-radius:999px; transition:width .25s ease;}
  .qhead{display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:var(--muted); margin-bottom:6px;}
  .qtext{font-size:18px; font-weight:800; margin:2px 0 14px; line-height:1.5;}
  .choice{
    width:100%; text-align:left; background:#fff; border:2px solid var(--line); color:var(--ink);
    font-family:inherit; font-size:15.5px; font-weight:600; padding:14px 14px; border-radius:13px;
    margin-bottom:10px; cursor:pointer; display:flex; gap:10px; align-items:flex-start; line-height:1.45;
  }
  .choice:active{transform:scale(.99);}
  .choice .mk{flex:0 0 26px; height:26px; border-radius:50%; background:#eef2f9; color:var(--muted); font-weight:800; display:flex; align-items:center; justify-content:center; font-size:14px;}
  .choice.ok{border-color:var(--green); background:var(--ok-bg);}
  .choice.ok .mk{background:var(--green); color:#fff;}
  .choice.ng{border-color:var(--red); background:var(--ng-bg);}
  .choice.ng .mk{background:var(--red); color:#fff;}
  .choice.dim{opacity:.6;}
  .choice:disabled{cursor:default;}
  .fb{border-radius:13px; padding:12px 14px; margin:4px 0 12px; font-size:14px; font-weight:600;}
  .fb.ok{background:var(--ok-bg); color:var(--green-d);}
  .fb.ng{background:var(--ng-bg); color:#9b1c1c;}
  .fb .ttl{font-weight:800; display:block; margin-bottom:2px;}
  .kids .qtext{font-size:20px;}
  .kids .choice{font-size:17px;}
  .result-score{text-align:center; padding:6px 0 2px;}
  .result-score .big{font-size:46px; font-weight:900; line-height:1; color:var(--blue);}
  .result-score .big small{font-size:20px; color:var(--muted); font-weight:800;}
  .prize{border-radius:16px; padding:16px; text-align:center; margin:12px 0; color:#fff;}
  .prize.top{background:linear-gradient(135deg,#f59e0b,#f97316);}
  .prize.part{background:linear-gradient(135deg,#34a0ff,#1f6feb);}
  .prize .lab{font-size:12px; font-weight:700; opacity:.95;}
  .prize .name{font-size:24px; font-weight:900; margin-top:2px;}
  .prize .emj{font-size:30px;}
  .staff{font-size:12px; color:var(--muted); text-align:center; margin-top:-4px;}
  .cta{background:#f0f6ff; border:1px solid #d6e6ff; border-radius:16px; padding:14px; margin-top:6px;}
  .cta h3{margin:0 0 8px; font-size:15px;}
  .cta ul{margin:0; padding-left:18px; font-size:13.5px; color:#334155;}
  .cta li{margin:4px 0;}
  footer.app{margin-top:auto; padding-top:14px; text-align:center; font-size:11.5px; color:var(--muted);}
  footer.app a{color:var(--muted);}
  .admin h2{margin-top:0;}
  table{width:100%; border-collapse:collapse; font-size:12.5px;}
  th,td{border-bottom:1px solid var(--line); padding:7px 6px; text-align:left; vertical-align:top;}
  th{color:var(--muted); font-weight:700; font-size:11.5px;}
  td.num,th.num{text-align:right; white-space:nowrap;}
  .bar{height:7px; background:#eef2f9; border-radius:999px; overflow:hidden; margin-top:3px;}
  .bar > i{display:block; height:100%; background:var(--blue);}
  .bar.low > i{background:var(--red);} .bar.mid > i{background:var(--amber);} .bar.high > i{background:var(--green);}
  .kpis{display:flex; gap:8px; flex-wrap:wrap;}
  .kpi{flex:1; min-width:90px; background:#f6f8fc; border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
  .kpi .v{font-size:22px; font-weight:900;}
  .kpi .k{font-size:11px; color:var(--muted);}
  .setblock{margin:12px 0 4px;}
  .setblock h3{font-size:14px; margin:0 0 4px; display:flex; gap:8px; align-items:center;}
  .banner{background:#fff7e6; border:1px solid #ffe2a8; color:#7a5200; border-radius:12px; padding:10px 12px; font-size:12.5px; margin-bottom:12px;}
  details.help{margin-top:8px;} details.help summary{cursor:pointer; font-size:13px; font-weight:700; color:var(--blue-d);}
  .hint{font-size:12px; color:var(--muted); margin-top:6px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .link{background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; font-family:inherit; text-decoration:underline; padding:0;}
</style>
</head>

/* ---- オンライン送信＋オフライン退避（テザリングが切れてもデータを失わない） ---- */
function queueLoad(){ try{ return JSON.parse(localStorage.getItem(CONFIG.storeKey+"_queue"))||[]; }catch(e){ return []; } }
function queueSave(q){ try{ localStorage.setItem(CONFIG.storeKey+"_queue", JSON.stringify(q)); }catch(e){} }
// 1件をスプレッドシートへ送信。失敗（圏外等）なら端末内のキューに退避
function sendResult(resp){
  if(!CONFIG.submitUrl) return;                       // 送信先未設定ならローカル保存のみ
  fetch(CONFIG.submitUrl, {method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(resp)})
    .catch(()=>{ const q=queueLoad(); q.push(resp); queueSave(q); });
}
// 退避分をまとめて再送信（オンライン復帰時・起動時・手動）
function flushQueue(){
  if(!CONFIG.submitUrl) return;
  const items=queueLoad(); if(!items.length) return;
  let remaining=items.length, failed=[];
  items.forEach(it=>{
    fetch(CONFIG.submitUrl, {method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(it)})
      .catch(()=>{ failed.push(it); })
      .finally(()=>{ if(--remaining===0){ queueSave(failed); if(location.hash==="#admin") render(); } });
  });
}

/* ============================================================
   クイズ進行
   ============================================================ */
function startQuiz(cat,diff){
  state.category=cat; state.difficulty=diff; state.qIndex=0; state.answers=[]; state.locked=false; state.saved=false; state.view="quiz";
  render();
}
function choose(i){
  if(state.locked) return;
  const q=QUIZ_DATA[state.category][state.difficulty][state.qIndex];
  state.answers[state.qIndex]={chosen:i, correct:i===q.answer};
  state.locked=true; render();
}
function next(){
  const qs=QUIZ_DATA[state.category][state.difficulty];
  if(state.qIndex<qs.length-1){ state.qIndex++; state.locked=false; render(); }
  else finish();
}
function finish(){
  if(!state.saved){
    const qs=QUIZ_DATA[state.category][state.difficulty];
    const score=state.answers.filter(a=>a&&a.correct).length;
    const resp={
      id:newId(), ts:new Date().toISOString(), device:deviceLabel(),
      category:state.category, difficulty:state.difficulty,
      total:qs.length, score:score,
      prize: score>=CONFIG.prizeThreshold?"top":"part",
      answers: state.answers.map((a,i)=>({n:i, chosen:a?a.chosen:-1, correct:a?!!a.correct:false}))
    };
    const all=loadAll(); all.push(resp); saveAll(all);   // 端末内に控えを保存（バックアップ）
    sendResult(resp);                                    // スプレッドシートへ自動送信（失敗時は退避）
    state.saved=true;
  }
  state.view="result"; render();
}

/* ============================================================
   集計（スタッフ用）
   ============================================================ */
function aggregate(data){
  const out={total:data.length, bySet:{}, perQ:{}, scoreDist:{}, prize:{top:0,part:0}, byDevice:{}};
  data.forEach(r=>{
    const sk=r.category+"|"+r.difficulty;
    out.bySet[sk]=(out.bySet[sk]||0)+1;
    out.prize[r.prize]=(out.prize[r.prize]||0)+1;
    out.scoreDist[r.score]=(out.scoreDist[r.score]||0)+1;
    const dev=r.device||"(未設定)"; out.byDevice[dev]=(out.byDevice[dev]||0)+1;
    (r.answers||[]).forEach(a=>{
      const qk=r.category+"|"+r.difficulty+"|"+a.n;
      if(!out.perQ[qk]) out.perQ[qk]={answered:0,correct:0};
      out.perQ[qk].answered++; if(a.correct) out.perQ[qk].correct++;
    });
  });
  return out;
}

        <span>☁️ オンライン送信：<b style="color:${sendSet?'var(--green-d)':'var(--red)'}">${sendSet?'設定済み':'未設定'}</b> ／ 未送信(退避)：<b>${queued}件</b></span>
        ${sendSet
          ? `<button class="btn" style="width:auto;padding:8px 12px;font-size:13px;" data-action="flushNow">📤 今すぐ送信</button>`
          : `<span style="font-size:11.5px;">※連携手順のURLを CONFIG.submitUrl に設定すると有効化されます</span>`}
      </div>
    </div>

    <div class="card admin">
      <h3 style="margin-top:0;">設問ごとの正解率</h3>
      ${perQHtml}
    </div>

    <div class="card admin">
      <h3 style="margin-top:0;">得点の分布</h3>
      <table><tbody>${scoreRows||'<tr><td colspan="2">データなし</td></tr>'}</tbody></table>
      <h3>端末別の件数</h3>
      <table><tbody>${devRows||'<tr><td colspan="2">データなし</td></tr>'}</tbody></table>
    </div>

    <div class="card admin">
      <h3 style="margin-top:0;">この端末の設定</h3>
      <label style="font-size:13px;color:var(--muted);">端末名（任意・集計の識別用。例：受付A）</label>
      <div class="row" style="margin-top:6px;">
        <input id="devInput" value="${esc(dev)}" placeholder="例：受付A" style="flex:1;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit;" />
        <button class="btn" style="width:auto;padding:12px 16px;" data-action="saveDevice">保存</button>
      </div>
      <details class="help"><summary>⚠️ データ消去（イベント前のテスト消去など）</summary>
        <p class="hint">この端末に保存した回答データをすべて消します。元に戻せません。先に「バックアップ(JSON)」での書き出しをおすすめします。</p>
        <button class="btn" style="background:var(--red);" data-action="clearData">この端末のデータを全消去</button>
      </details>
    </div>`;
}

/* ============================================================
   CSV / JSON 入出力
   ============================================================ */
function csvCell(v){ const s=String(v==null?"":v); return '"'+s.replace(/"/g,'""')+'"'; }
function download(filename, text, mime){
  const blob=new Blob([text], {type:(mime||"text/plain")+";charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },300);
}
function stamp(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`; }

function exportResponsesCsv(){
  const data=currentData();
  const head=["ID","日時","端末","ジャンル","難易度","得点","満点","景品"];
  for(let i=1;i<=7;i++) head.push("Q"+i+"正誤");
  for(let i=1;i<=7;i++) head.push("Q"+i+"選択");
  const rows=[head.map(csvCell).join(",")];
  data.forEach(r=>{
    const row=[r.id, r.ts, r.device||"", CAT_LABEL[r.category]||r.category, DIFF_LABEL[r.difficulty]||r.difficulty,
               r.score, r.total, r.prize==="top"?CONFIG.topPrize:CONFIG.partPrize];
    for(let i=0;i<7;i++){ const a=(r.answers||[]).find(x=>x.n===i); row.push(a?(a.correct?1:0):""); }
    for(let i=0;i<7;i++){ const a=(r.answers||[]).find(x=>x.n===i); row.push(a?(a.chosen+1):""); }
    rows.push(row.map(csvCell).join(","));
  });
  download(`回答データ_${stamp()}.csv`, "﻿"+rows.join("\r\n"), "text/csv");
}
function exportSummaryCsv(){
  const data=currentData(); const ag=aggregate(data);
  const rows=[["ジャンル","難易度","設問No","設問","回答数","正解数","正解率(%)"].map(csvCell).join(",")];
  Object.keys(QUIZ_DATA).forEach(cat=>{
    DIFFS.forEach(diff=>{
      QUIZ_DATA[cat][diff].forEach((q,n)=>{
        const s=ag.perQ[cat+"|"+diff+"|"+n]; const answered=s?s.answered:0, correct=s?s.correct:0;
        const rate=answered? Math.round(correct/answered*1000)/10 : "";
        rows.push([CAT_LABEL[cat], DIFF_LABEL[diff], "Q"+(n+1), q.q, answered, correct, rate].map(csvCell).join(","));
      });
    });
  });
  download(`設問別集計_${stamp()}.csv`, "﻿"+rows.join("\r\n"), "text/csv");
}
function exportJson(){
  download(`バックアップ_${deviceLabel()||"端末"}_${stamp()}.json`, JSON.stringify(loadAll()), "application/json");
}
function importJson(files){
  if(!files||!files.length) return;
  let pending=files.length; let incoming=[];
  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=()=>{
      try{ const arr=JSON.parse(r.result); if(Array.isArray(arr)) incoming=incoming.concat(arr); }catch(e){ alert(f.name+" を読み込めませんでした"); }
      if(--pending===0){
        const map=new Map();
        (adminMerged||loadAll()).forEach(x=>x&&x.id&&map.set(x.id,x));
        incoming.forEach(x=>x&&x.id&&map.set(x.id,x));
        adminMerged=Array.from(map.values());
        render();
        alert("合算しました。現在 "+adminMerged.length+" 件を表示しています。");
      }
    };
    r.readAsText(f);
  });
}

/* ============================================================
   イベント処理
   ============================================================ */
app.addEventListener("click", e=>{
  const t=e.target.closest("[data-action]"); if(!t) return;
  const a=t.dataset.action, v=t.dataset.value;
  switch(a){
    case "toCategory": state.view="category"; render(); break;
    case "selectCategory": state.category=v; state.view="difficulty"; render(); break;
    case "selectDifficulty": startQuiz(state.category, v); break;
    case "choose": choose(parseInt(v,10)); break;
    case "next": next(); break;
    case "home": goHome(); break;
    case "restart": goHome(); break;
    case "retrySame": startQuiz(state.category, state.difficulty); break;
    case "csvResp": exportResponsesCsv(); break;
    case "csvSummary": exportSummaryCsv(); break;
    case "exportJson": exportJson(); break;
    case "importJson": document.getElementById("importFile").click(); break;
    case "resetMerge": adminMerged=null; render(); break;
    case "saveDevice": { const el=document.getElementById("devInput"); setDeviceLabel(el?el.value.trim():""); alert("端末名を保存しました"); render(); break; }
    case "flushNow": flushQueue(); alert("未送信データの再送信を試みました。数秒後に『未送信(退避)』件数をご確認ください。"); setTimeout(render, 1200); break;
    case "clearData": if(confirm("この端末の回答データをすべて消去します。よろしいですか？")){ saveAll([]); adminMerged=null; alert("消去しました"); render(); } break;
  }
});
// フッターの「スタッフ用 集計画面」リンク（#app の外）
document.addEventListener("click", e=>{
  const t=e.target.closest('[data-action="admin"]');
  if(t && !app.contains(t)){ location.hash="#admin"; }
});
document.getElementById("importFile").addEventListener("change", e=>{ importJson(e.target.files); e.target.value=""; });
window.addEventListener("hashchange", render);

/* ============================================================
   オフライン対応（Service Worker 登録）
   ※ http/https で配信したときのみ有効。file:// では無効でも動作します
   ============================================================ */
if("serviceWorker" in navigator && (location.protocol==="https:"||location.protocol==="http:")){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}

// 退避した未送信データを、オンライン復帰時・起動時に自動再送
window.addEventListener("online", flushQueue);
window.addEventListener("load", flushQueue);

render();
</script>
</body>
</html>
